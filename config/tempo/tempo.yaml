# Northwood Tempo config — single-binary "all" target, local filesystem
# backend, 24h retention. Showcase scale; production splits ingester /
# querier / compactor / distributor into separate processes with object
# storage (S3 / GCS).
#
# OTLP receivers exposed on 4317 (gRPC) and 4318 (HTTP). Spring services
# push via micrometer-tracing-bridge-otel + opentelemetry-exporter-otlp
# (wired in the app instrumentation).

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  trace_idle_period: 10s
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 24h

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal
