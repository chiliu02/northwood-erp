# Loaded only when SPRING_PROFILES_ACTIVE=kafka. Activates the
# KafkaInboxDispatcher with a subscription to product.events; the
# ReorderPolicyChangedHandler is auto-discovered as an InboxEnvelopeHandler.
spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      # group-id ties this consumer to its own offsets; renaming would re-read
      # the topic from the start. Keep stable per service.
      group-id: inventory-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # No commit settings here → Spring Kafka defaults: enable.auto.commit=false
      # + AckMode.BATCH, so an offset commits only after the listener returns
      # successfully (handler exception → no commit → redelivery; the inbox dedup
      # makes that safe). Full contract: docs/messaging.md → Consumer-side idempotency.
      auto-offset-reset: earliest
    # Turn on Spring Kafka's Micrometer observation so KafkaTemplate.send creates
    # a producer span (W3C traceparent stamped on the record headers) and
    # @KafkaListener-managed containers continue the trace via a consumer span.
    # Combined with OutboxPublisher's per-row Observation wrap, every
    # cross-service event preserves trace context through the bus.
    template:
      observation-enabled: true
    listener:
      observation-enabled: true

northwood:
  service-name: inventory          # stamps source-service header / Kafka topic
  outbox:
    drain:
      enabled: true                # activates OutboxDrainAutoConfiguration (drainer + scheduler)
  kafka:
    # Topics this service subscribes to. KafkaInboxDispatcher fans incoming
    # records out to all matching InboxEnvelopeHandler beans.
    #   product.events       → ReorderPolicyChangedHandler
    #   sales.events         → StockReservationRequestedHandler,
    #                          SalesOrderCancellationRequestedHandler
    #                          (releases reservation + emits ack),
    #                          SalesOrderPlacedHandler (seeds
    #                          sales_order_line_facts for shipment validation).
    #   manufacturing.events → RawMaterialReservationRequestedHandler,
    #                          WorkOrderManufacturingCompletedHandler (bumps
    #                          FG stock_balance on production confirmation),
    #                          RawMaterialReservationReleaseRequestedHandler
    #                          (cancels rm reservations on WO cancel).
    #   purchasing.events    → PurchaseOrderCreatedHandler (seeds
    #                          purchase_order_line_facts for receipt validation).
    subscribe-topics: product.events,sales.events,manufacturing.events,purchasing.events
    dlt:
      redrive:
        enabled: true             # per-service DLT auto-redrive: re-applies this
                                  # service's own dead-lettered records, parks the unrecoverable ones

