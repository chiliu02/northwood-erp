# Master changelog for inventory-service.
#
# The northwood_erp database is provisioned directly from db/northwood_erp.sql
# (mounted into Postgres's docker init dir on first boot of a fresh volume).
# Liquibase creates the databasechangelog and databasechangeloglock bookkeeping
# tables in the inventory schema on first boot, then applies changesets listed
# below.
#
# To add a future migration:
#   1. Drop a Liquibase formatted-SQL file in changes/, e.g.
#      changes/2026-06-01-add-something.sql
#   2. Append an include entry below pointing at it.
databaseChangeLog:
  - include:
      file: db/changelog/changes/2026-05-14-stock-item-add-discontinued-at.sql
  - include:
      file: db/changelog/changes/2026-05-19-receipt-shipment-status-check-rename-cancelled-to-reversed.sql
