spring:
  application:
    name: inventory-service
  profiles:
    default: dev
  datasource:
    url: ${INVENTORY_DB_URL:jdbc:postgresql://localhost:5432/northwood_erp?currentSchema=inventory,shared}
    username: ${INVENTORY_DB_USER:postgres}
    password: ${INVENTORY_DB_PASSWORD:postgres}
    hikari:
      pool-name: inventory-pool
      maximum-pool-size: 10
      connection-init-sql: SET search_path TO inventory, shared
  security:
    oauth2:
      resourceserver:
        jwt:
          # Slice A: every endpoint requires a valid Keycloak JWT.
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8090/realms/northwood}

server:
  port: ${INVENTORY_PORT:8083}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics

northwood:
  outbox:
    poll-interval: 1000
  liquibase:
    enabled: true
    default-schema: inventory
    change-log: classpath:db/changelog/db.changelog-master.yaml

logging:
  level:
    com.northwood: DEBUG
    liquibase: INFO
