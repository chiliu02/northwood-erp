# Northwood ERP — local development infrastructure.
#
# Showcase mode runs all 7 services against a single PostgreSQL database with
# schema-per-service isolation. To approximate production (database-per-service),
# duplicate the postgres service per microservice and point each service's
# *_DB_URL env var at its own instance.

services:
  postgres:
    image: postgres:17
    container_name: northwood-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: northwood_erp
    ports:
      - "5432:5432"
    volumes:
      - northwood-pgdata:/var/lib/postgresql/data
      # Mounted into Postgres's init-script directory; the official image runs
      # any *.sql / *.sh placed here exactly once, on the first boot of a fresh
      # data volume. This loads the baseline schema, roles, and grants only —
      # NO data. To also pre-populate the showcase fixture rows (products,
      # BOMs, customers, suppliers, etc.) layer in docker-compose.seed.yml:
      #   docker compose down -v
      #   docker compose -f docker-compose.yml -f docker-compose.seed.yml up -d
      # See db/northwood_erp_seed.sql + the override file for details.
      - ./db/northwood_erp.sql:/docker-entrypoint-initdb.d/01-northwood_erp.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Single-broker Kafka in KRaft mode (no ZooKeeper). The only wired
  # EventPublisher in the codebase is KafkaEventPublisher, registered under
  # @Profile("kafka") together with each service's outbox drainer — without
  # SPRING_PROFILES_ACTIVE=kafka, no event bus is registered at all and
  # cross-service flows silently never fire. No schema registry by design —
  # wire format is JSON via Jackson 3. The image version matches the
  # kafka-clients 4.1.2 that Spring Boot 4.0.5's BOM ships.
  kafka:
    image: apache/kafka:4.1.2
    container_name: northwood-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft single-node setup (broker + controller in one process).
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      # Clients on the host connect via localhost:9092. When services are moved
      # into the docker-compose network, swap PLAINTEXT for an INTERNAL listener
      # advertised as kafka:9092 alongside the existing PLAINTEXT://localhost:9092.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      # Auto-create event topics (`product.events`, `inventory.events`, ...) on
      # first publish. We can flip this off and pre-declare topics later.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Single-broker overrides. Kafka's defaults assume a 3-broker cluster;
      # without these the internal topics __consumer_offsets and
      # __transaction_state can't be created (replicas=3 > brokers=1) and
      # consumer groups silently fail FIND_COORDINATOR.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      # Fixed cluster ID so a recreated container reattaches to a kept volume.
      # Any base64-encoded 16-byte UUID works; this one is the apache/kafka
      # quickstart's example value.
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
    volumes:
      - northwood-kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  # Identity provider. Realm `northwood` carries the 13 roles + 13 demo users
  # + two clients (northwood-bff for the confidential code flow, northwood-spa
  # reserved for direct PKCE later).
  # Realm import runs once on first start of a fresh data volume; to re-seed,
  # `docker compose down -v` then `up -d keycloak`. Dev mode (`start-dev`)
  # disables HTTPS — fine for the local showcase, never production.
  #
  # Bootstrap admin (KC_BOOTSTRAP_ADMIN_*) creates an initial admin user the
  # first time the volume is empty; subsequent boots ignore the env vars.
  # Keycloak admin console at http://localhost:8090/.
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: northwood-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8090:8080"
    volumes:
      - ./db/keycloak/northwood-realm.json:/opt/keycloak/data/import/northwood-realm.json:ro
      - northwood-keycloakdata:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"status\": \"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # Optional: pgAdmin for database inspection. Uncomment to enable.
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@northwood.local
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #   ports:
  #     - "5050:80"
  #   depends_on:
  #     - postgres

  # -------- Observability: LGTM stack (Loki / Grafana / Tempo / Prometheus) --------
  #
  # Phase-1 showcase posture: 100% trace sampling, single-instance everything,
  # no auth on Grafana (anonymous Admin). Containers run on the host
  # docker bridge; Spring services run on the Windows host and reach this stack
  # via localhost:<port>. Prometheus reaches the host services through
  # `host.docker.internal:<service-port>` — that DNS name is Docker-Desktop's
  # built-in host loopback and works the same on Windows and macOS. On Linux
  # `extra_hosts: ["host.docker.internal:host-gateway"]` is added to each
  # consumer below so the same target syntax works there too.
  #
  # Why these images: Tempo + Loki + Promtail must move together (Grafana Labs
  # ships them as one product line); Prometheus + Grafana are independent.
  # Pinned to versions current at 2026-05-20 — bump as a single slice in 1D
  # Phase 2 when the next minor lands.

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: northwood-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=24h
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./db/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - northwood-prometheusdata:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Tempo: distributed tracing backend. Receives OTLP from Spring services on
  # 4317 (gRPC) / 4318 (HTTP). 3200 is the Grafana datasource HTTP endpoint.
  # `--target=all` runs every microservice in one process — fine for showcase
  # scale; production splits these (ingester/querier/compactor/distributor).
  tempo:
    image: grafana/tempo:2.7.0
    container_name: northwood-tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "3200:3200"  # Tempo HTTP API (Grafana queries this)
      - "4317:4317"  # OTLP gRPC receiver (Spring services push here)
      - "4318:4318"  # OTLP HTTP receiver
    volumes:
      - ./db/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - northwood-tempodata:/var/tempo

  loki:
    image: grafana/loki:3.3.0
    container_name: northwood-loki
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./db/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - northwood-lokidata:/loki

  # Promtail tails docker container logs (postgres, kafka, keycloak) and ships
  # them to Loki. Spring service logs are NOT tailed here — they run on the
  # host and push directly via loki-logback-appender (configured in 1D.1).
  # Promtail covers the "infra log line that mentions a service" path so all
  # log searches surface in one place.
  promtail:
    image: grafana/promtail:3.3.0
    container_name: northwood-promtail
    command: ["-config.file=/etc/promtail/promtail-config.yaml"]
    volumes:
      - ./db/promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - northwood-promtaildata:/tmp
    depends_on:
      - loki

  # Grafana: single pane. Anonymous Admin in dev mode — never deploy this
  # config beyond the local showcase. Datasources + dashboards provisioned
  # from db/grafana/provisioning/ so a fresh `docker compose up -d` boots
  # with everything wired.
  grafana:
    image: grafana/grafana:11.3.1
    container_name: northwood-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    ports:
      - "3000:3000"
    volumes:
      - ./db/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./db/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - northwood-grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
      - tempo
      - loki

volumes:
  northwood-pgdata:
  northwood-kafkadata:
  northwood-keycloakdata:
  northwood-prometheusdata:
  northwood-tempodata:
  northwood-lokidata:
  northwood-promtaildata:
  northwood-grafanadata:
