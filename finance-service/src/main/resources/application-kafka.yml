# Loaded only when SPRING_PROFILES_ACTIVE=kafka. Finance is both a producer
# (SupplierInvoiceApproved phase 4; customer-invoice / payment events later)
# and a consumer (PurchaseOrderCreated + GoodsReceived for the
# purchase_order_line_facts projection used by 3-way match).
spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      group-id: finance-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # No commit settings here → Spring Kafka defaults: enable.auto.commit=false
      # + AckMode.BATCH, so an offset commits only after the listener returns
      # successfully (handler exception → no commit → redelivery; the inbox dedup
      # makes that safe). Full contract: docs/messaging.md → Consumer-side idempotency.
      auto-offset-reset: earliest

northwood:
  service-name: finance            # stamps source-service header / Kafka topic
  outbox:
    poll-interval: 1000
    drain:
      enabled: true                # activates OutboxDrainAutoConfiguration (drainer + scheduler)
  kafka:
    # Finance subscribes to:
    # - purchasing.events for PurchaseOrderCreated (seeds the PO line facts).
    # - inventory.events for GoodsReceived (bumps received_quantity on the
    #   facts row; gates 3-way match on the AP side) + ShipmentPosted (COGS).
    # - sales.events for SalesOrderShipped (auto-creates customer invoices).
    # - product.events: ProductCreated (seed finance.product_card stub),
    #   StandardCostChanged + ValuationClassChanged (fill in attribute
    #   columns), ProductDiscontinued (stamp discontinued_at). The four
    #   together make every product-accounting row's lifetime mirror the
    #   Product aggregate's.
    subscribe-topics: purchasing.events,inventory.events,sales.events,product.events
