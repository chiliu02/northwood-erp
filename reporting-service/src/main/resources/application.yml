spring:
  application:
    name: reporting-service
  profiles:
    default: dev
  datasource:
    url: ${REPORTING_DB_URL:jdbc:postgresql://localhost:5432/northwood_erp?currentSchema=reporting,shared}
    username: ${REPORTING_DB_USER:postgres}
    password: ${REPORTING_DB_PASSWORD:postgres}
    hikari:
      pool-name: reporting-pool
      maximum-pool-size: 10
      connection-init-sql: SET search_path TO reporting, shared
  security:
    oauth2:
      resourceserver:
        jwt:
          # Slice A: every endpoint requires a valid Keycloak JWT.
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8090/realms/northwood}

server:
  port: ${REPORTING_PORT:8087}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics

northwood:
  outbox:
    poll-interval: 1000
  liquibase:
    # Disabled — see docs/dev-todo.md for re-enable criteria. The baseline
    # db/northwood_erp.sql is the single source of truth while the schema
    # is in showcase-flux.
    enabled: false
    default-schema: reporting
    change-log: classpath:db/changelog/db.changelog-master.yaml
  audit:
    # Reporting is inbox-only — it has no outbox_message table for the shared
    # AuditController to query. The BFF's cross-service audit aggregator skips
    # this service silently when it responds 404.
    enabled: false

logging:
  level:
    com.northwood: DEBUG
    liquibase: INFO
