# Loaded only when SPRING_PROFILES_ACTIVE=kafka. Manufacturing is both a
# producer (WorkOrderCreated, eventually OperationCompleted etc) and a
# consumer (ManufacturingRequested from sales).
spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      group-id: manufacturing-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
    # §1D.2: turn on Spring Kafka's Micrometer observation so KafkaTemplate.send
    # creates a producer span (W3C traceparent stamped on the record headers)
    # and @KafkaListener-managed containers continue the trace via a consumer
    # span. Combined with OutboxPublisher's per-row Observation wrap, every
    # cross-service event preserves trace context through the bus.
    template:
      observation-enabled: true
    listener:
      observation-enabled: true

northwood:
  outbox:
    poll-interval: 1000
  saga:
    poll-interval: 1000
    # §2.13: claim-lease TTL + retry backoff for the @Scheduled saga worker.
    # Defaults shown; uncomment to override per environment (e.g. raise
    # lease-ttl under heavy load so a slow advance doesn't lose the lease).
    # lease-ttl-seconds: 30
    # retry-backoff-seconds: 15
  kafka:
    # Manufacturing subscribes to:
    # - product.events    for MakeVsBuyChanged (Shape A make-vs-buy projection
    #   into manufacturing.product_card) and ApprovedVendorListChanged
    #   (manufacturing.product_approved_vendor projection — read by the §2.8
    #   Slice C materialsCost rollup engine).
    # - sales.events      for ManufacturingRequested (saga-driven WO release).
    # - inventory.events  for RawMaterialsReserved (response to its own
    #   RawMaterialReservationRequested), which drives the make-to-order saga
    #   from raw_material_reservation_requested onward.
    # - purchasing.events for SupplierProductPriceChanged (§2.8 Slice C drives
    #   the materialsCost rollup for purchased items off these).
    subscribe-topics: product.events,sales.events,inventory.events,purchasing.events
