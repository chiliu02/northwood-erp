# Loaded only when SPRING_PROFILES_ACTIVE=kafka. Manufacturing is both a
# producer (WorkOrderCreated, ReplenishmentDispatched / ReplenishmentUndispatchable,
# etc) and a consumer (inventory.ReplenishmentRequested → make-to-stock WO release;
# sales.SalesOrderCancellationRequested → compensation).
spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      group-id: manufacturing-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # No commit settings here → Spring Kafka defaults: enable.auto.commit=false
      # + AckMode.BATCH, so an offset commits only after the listener returns
      # successfully (handler exception → no commit → redelivery; the inbox dedup
      # makes that safe). Full contract: docs/messaging.md → Consumer-side idempotency.
      auto-offset-reset: earliest

northwood:
  service-name: manufacturing      # stamps source-service header / Kafka topic
  outbox:
    poll-interval: 1000
    drain:
      enabled: true                # activates OutboxDrainAutoConfiguration (drainer + scheduler)
  saga:
    poll-interval: 1000
    # §2.13: claim-lease TTL + retry backoff for the @Scheduled saga worker.
    # Defaults shown; uncomment to override per environment (e.g. raise
    # lease-ttl under heavy load so a slow advance doesn't lose the lease).
    # lease-ttl-seconds: 30
    # retry-backoff-seconds: 15
  kafka:
    # Manufacturing subscribes to:
    # - product.events    for MakeVsBuyChanged (Shape A make-vs-buy projection
    #   into manufacturing.product_card) and ApprovedVendorListChanged
    #   (manufacturing.product_approved_vendor projection — read by the §2.8
    #   Slice C materialsCost rollup engine).
    # - sales.events      for SalesOrderCancellationRequested (compensation —
    #   cancel any WOs for the order). §2.37 Slice 3 retired the
    #   ManufacturingRequested consumer (sales no longer drives WO release).
    # - inventory.events  for ReplenishmentRequested (targetService=manufacturing
    #   → make-to-stock WO release) and RawMaterialsReserved (response to its own
    #   RawMaterialReservationRequested), which drives the WO-lifecycle saga
    #   from raw_material_reservation_requested onward.
    # - purchasing.events for SupplierProductPriceChanged (§2.8 Slice C drives
    #   the materialsCost rollup for purchased items off these).
    subscribe-topics: product.events,sales.events,inventory.events,purchasing.events
    dlt:
      redrive:
        enabled: true             # per-service DLT auto-redrive (§2.28 Tier 1.B): re-applies this
                                  # service's own dead-lettered records, parks the unrecoverable ones

