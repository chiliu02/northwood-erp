# Master changelog for purchasing-service.
#
# The northwood_erp database is provisioned directly from db/northwood_erp.sql
# (mounted into Postgres's docker init dir on first boot of a fresh volume).
# Liquibase creates the databasechangelog and databasechangeloglock bookkeeping
# tables in the purchasing schema on first boot, then applies changesets listed
# below.
#
# To add a future migration:
#   1. Drop a Liquibase formatted-SQL file in changes/, e.g.
#      changes/2026-06-01-add-something.sql
#   2. Append an include entry below pointing at it.
databaseChangeLog:
  - include:
      file: db/changelog/changes/2026-05-14-add-product-discontinued-projection.sql
  - include:
      file: db/changelog/changes/2026-05-15-trim-purchase-to-pay-saga-states.sql
  - include:
      file: db/changelog/changes/2026-05-18-rename-product-discontinued-to-product-card.sql
