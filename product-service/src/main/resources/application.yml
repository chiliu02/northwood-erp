spring:
  application:
    name: product-service
  profiles:
    # 'dev' is implied when nothing else is active; use SPRING_PROFILES_ACTIVE=kafka
    # (or any other set) to switch buses without editing this file.
    default: dev
  datasource:
    # In showcase mode (single database), every service points at the same URL
    # but authenticates as its own role. For database-per-service, change only
    # this URL and the role's grants follow the service to its own database.
    url: ${PRODUCT_DB_URL:jdbc:postgresql://localhost:5432/northwood_erp?currentSchema=product,shared}
    username: ${PRODUCT_DB_USER:postgres}
    password: ${PRODUCT_DB_PASSWORD:postgres}
    hikari:
      pool-name: product-pool
      maximum-pool-size: 10
      # Pin the search_path on every connection borrowed from the pool. The
      # service can resolve unqualified table names to its own schema and
      # cannot accidentally read from another context.
      connection-init-sql: SET search_path TO product, shared
  jdbc:
    template:
      query-timeout: 30s
  security:
    oauth2:
      resourceserver:
        jwt:
          # Slice A: every endpoint requires a valid Keycloak JWT. The shared
          # SecurityConfig in the shared module activates whenever this
          # property is set; leaving it unset disables auth entirely (e.g.
          # for pure unit-test runs that don't boot Spring).
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8090/realms/northwood}

server:
  port: ${PRODUCT_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        # §1D.1: prometheus joined the include set so Grafana can scrape this
        # service's metrics. `health, info, metrics` predate §1D.
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized
  # §1D.10: suppress the @Scheduled heartbeat spans — saga poll / outbox drain
  # tick / SSE pump fire ~1×/s whether or not there's work and swamp Tempo. The
  # real work spans (outbox.publish, saga.<state>) are created manually only when
  # something happens, so disabling the scheduled-task observation loses nothing.
  observations:
    enable:
      tasks.scheduled.execution: false
      # §1D.11: drop Spring Security observation spans (secured request /
      # authenticate / authorize / security filterchain) — framework noise, not
      # service business flow.
      spring.security: false
  # §1D.1: trace + log correlation. Sampling defaults to 1.0 (rich demo data);
  # override NORTHWOOD_TRACING_SAMPLING to 0.1 for prod-style runs. OTLP_ENDPOINT
  # points at Tempo (docker-compose service published to localhost:4317).
  tracing:
    sampling:
      probability: ${NORTHWOOD_TRACING_SAMPLING:1.0}
  otlp:
    metrics:
      export:
        enabled: false                                # metrics go to Prometheus via scrape; don't OTLP-push them (Tempo's :4318 has no /v1/metrics → 404)
  opentelemetry:
    tracing:
      export:
        otlp:
          # Boot 4 relocated these from management.otlp.tracing.* (now deprecated-ERROR → silently ignored).
          endpoint: ${OTLP_ENDPOINT:http://localhost:4317}
          transport: grpc                             # :4317 = Tempo's OTLP gRPC receiver (default transport is http → :4318/v1/traces)

northwood:
  outbox:
    poll-interval: 1000  # ms
  liquibase:
    # Disabled — see docs/dev-todo.md for re-enable criteria. The baseline
    # db/northwood_erp.sql is the single source of truth while the schema
    # is in showcase-flux.
    enabled: false
    default-schema: product
    change-log: classpath:db/changelog/db.changelog-master.yaml

logging:
  level:
    com.northwood: DEBUG
    org.springframework.jdbc.core: INFO
    liquibase: INFO
