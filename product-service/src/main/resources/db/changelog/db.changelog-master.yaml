# Master changelog for product-service.
#
# Currently empty — Liquibase is disabled (`northwood.liquibase.enabled: false`
# in application.yml) while the DB schema is still in showcase-flux. The
# baseline `db/northwood_erp.sql` is the single source of truth for schema and
# is rebaked every slice that ships a structural change; the development
# workflow assumes `docker compose down -v` on schema changes.
#
# All prior changesets (2026-05-14 through 2026-05-19) were folded into the
# baseline and removed in the consolidation slice (see docs/persistence.md for
# the re-enable criteria).
#
# To re-enable migrations later:
#   1. Flip `northwood.liquibase.enabled: true` in application.yml.
#   2. Drop a Liquibase formatted-SQL file in changes/, e.g.
#      changes/2026-06-01-add-something.sql
#   3. Append an include entry to databaseChangeLog below.
databaseChangeLog: []
