spring:
  application:
    name: sales-service
  profiles:
    default: dev
  datasource:
    url: ${SALES_DB_URL:jdbc:postgresql://localhost:5432/northwood_erp?currentSchema=sales,shared}
    username: ${SALES_DB_USER:postgres}
    password: ${SALES_DB_PASSWORD:postgres}
    hikari:
      pool-name: sales-pool
      maximum-pool-size: 10
      connection-init-sql: SET search_path TO sales, shared
  security:
    oauth2:
      resourceserver:
        jwt:
          # Slice A: every endpoint requires a valid Keycloak JWT.
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8090/realms/northwood}

server:
  port: ${SALES_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        # §1D.1: prometheus joined the include set so Grafana can scrape this
        # service's metrics. `health, info, metrics` predate §1D.
        include: health, info, metrics, prometheus
  # §1D.10: suppress the @Scheduled heartbeat spans — saga poll / outbox drain
  # tick / SSE pump fire ~1×/s whether or not there's work and swamp Tempo. The
  # real work spans (outbox.publish, saga.<state>) are created manually only when
  # something happens, so disabling the scheduled-task observation loses nothing.
  observations:
    enable:
      tasks.scheduled.execution: false
  # §1D.1: trace + log correlation. Sampling defaults to 1.0 (rich demo data);
  # override NORTHWOOD_TRACING_SAMPLING to 0.1 for prod-style runs. OTLP_ENDPOINT
  # points at Tempo (docker-compose service published to localhost:4317).
  tracing:
    sampling:
      probability: ${NORTHWOOD_TRACING_SAMPLING:1.0}
  otlp:
    metrics:
      export:
        enabled: false                                # metrics go to Prometheus via scrape; don't OTLP-push them (Tempo's :4318 has no /v1/metrics → 404)
  opentelemetry:
    tracing:
      export:
        otlp:
          # Boot 4 relocated these from management.otlp.tracing.* (now deprecated-ERROR → silently ignored).
          endpoint: ${OTLP_ENDPOINT:http://localhost:4317}
          transport: grpc                             # :4317 = Tempo's OTLP gRPC receiver (default transport is http → :4318/v1/traces)

northwood:
  outbox:
    poll-interval: 1000
  liquibase:
    # Disabled — see docs/dev-todo.md for re-enable criteria. The baseline
    # db/northwood_erp.sql is the single source of truth while the schema
    # is in showcase-flux.
    enabled: false
    default-schema: sales
    change-log: classpath:db/changelog/db.changelog-master.yaml

logging:
  level:
    com.northwood: DEBUG
    liquibase: INFO
