# Loaded only when SPRING_PROFILES_ACTIVE=kafka. Sales is both a producer
# (SalesOrderPlaced, StockReservationRequested) and a consumer
# (StockReserved feedback from inventory; later: ManufacturingCompleted, etc).
spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      group-id: sales-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # No commit settings here → Spring Kafka defaults: enable.auto.commit=false
      # + AckMode.BATCH, so an offset commits only after the listener returns
      # successfully (handler exception → no commit → redelivery; the inbox dedup
      # makes that safe). Full contract: docs/messaging.md → Consumer-side idempotency.
      auto-offset-reset: earliest
    # Turn on Spring Kafka's Micrometer observation so KafkaTemplate.send creates
    # a producer span (W3C traceparent stamped on the record headers) and
    # @KafkaListener-managed containers continue the trace via a consumer span.
    # Combined with OutboxPublisher's per-row Observation wrap, every
    # cross-service event preserves trace context through the bus.
    template:
      observation-enabled: true
    listener:
      observation-enabled: true

northwood:
  service-name: sales              # stamps source-service header / Kafka topic
  outbox:
    poll-interval: 1000
    drain:
      enabled: true                # activates OutboxDrainAutoConfiguration (drainer + scheduler)
  saga:
    poll-interval: 1000
    # Claim-lease TTL + retry backoff for the @Scheduled saga worker.
    # Defaults shown; uncomment to override per environment (e.g. raise
    # lease-ttl under heavy load so a slow advance doesn't lose the lease).
    # lease-ttl-seconds: 30
    # retry-backoff-seconds: 15
  kafka:
    # Sales subscribes to:
    # - product.events     for ProductCreated (seed sales.product_card
    #   stub) + SalesPriceChanged (fill in price+currency) + ProductDiscontinued
    #   (stamp discontinued_at) + ReplenishmentStrategyChanged (project
    #   to_stock|to_order for the fulfilment saga). These together make
    #   every row's lifetime mirror the Product aggregate's.
    # - inventory.events   for StockReserved + ShipmentPosted (saga advances) +
    #   ReplenishmentFulfilled (retry reservation) / ReplenishmentCancelled
    #   (reject order) plus SalesOrderCancellationApplied (compensation ack
    #   from inventory).
    # - manufacturing.events for SalesOrderCancellationApplied (compensation ack
    #   from manufacturing). The WorkOrderCreated / WorkOrderManufacturingCompleted
    #   / ManufacturingDispatched consumers were retired — sales no longer drives
    #   or tracks manufacturing directly.
    # - finance.events     for CustomerInvoiceCreated + CustomerPaymentReceived
    #   (saga advances past invoice_created → completed).
    # - purchasing.events  for PurchaseOrderCancellationApplied (the purchasing leg
    #   of multi-leg compensation — drains the buy-to-order pegged-PO leg so the
    #   fulfilment saga can reach compensated/compensation_failed).
    subscribe-topics: product.events,inventory.events,manufacturing.events,finance.events,purchasing.events
    dlt:
      redrive:
        enabled: true             # per-service DLT auto-redrive: re-applies this
                                  # service's own dead-lettered records, parks the unrecoverable ones

