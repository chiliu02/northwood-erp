# Loaded only when SPRING_PROFILES_ACTIVE=kafka. Sales is both a producer
# (SalesOrderPlaced, StockReservationRequested) and a consumer
# (StockReserved feedback from inventory; later: ManufacturingCompleted, etc).
spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      group-id: sales-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # No commit settings here → Spring Kafka defaults: enable.auto.commit=false
      # + AckMode.BATCH, so an offset commits only after the listener returns
      # successfully (handler exception → no commit → redelivery; the inbox dedup
      # makes that safe). Full contract: docs/messaging.md → Consumer-side idempotency.
      auto-offset-reset: earliest

northwood:
  service-name: sales              # stamps source-service header / Kafka topic
  outbox:
    poll-interval: 1000
    drain:
      enabled: true                # activates OutboxDrainAutoConfiguration (drainer + scheduler)
  saga:
    poll-interval: 1000
    # §2.13: claim-lease TTL + retry backoff for the @Scheduled saga worker.
    # Defaults shown; uncomment to override per environment (e.g. raise
    # lease-ttl under heavy load so a slow advance doesn't lose the lease).
    # lease-ttl-seconds: 30
    # retry-backoff-seconds: 15
  kafka:
    # Sales subscribes to:
    # - product.events     for ProductCreated (seed sales.product_card
    #   stub) + SalesPriceChanged (fill in price+currency) + ProductDiscontinued
    #   (stamp discontinued_at). The three together make every row's lifetime
    #   mirror the Product aggregate's.
    # - inventory.events   for StockReserved + ShipmentPosted (saga advances) +
    #   SalesOrderCancellationApplied (compensation ack from inventory).
    # - manufacturing.events for WorkOrderCreated, WorkOrderManufacturingCompleted,
    #   ManufacturingDispatched (saga advances past manufacturing_requested), and
    #   SalesOrderCancellationApplied (compensation ack from manufacturing).
    # - finance.events     for CustomerInvoiceCreated + CustomerPaymentReceived
    #   (saga advances past invoice_created → completed).
    subscribe-topics: product.events,inventory.events,manufacturing.events,finance.events
    dlt:
      redrive:
        enabled: true             # per-service DLT auto-redrive (§2.28 Tier 1.B): re-applies this
                                  # service's own dead-lettered records, parks the unrecoverable ones

