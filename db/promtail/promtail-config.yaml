# Northwood Promtail config — tails docker container logs for the infra
# services (postgres, kafka, keycloak) and pushes to Loki. Spring service
# logs run on the host process and push directly via loki-logback-appender
# (wired in §1D.1), so Promtail is intentionally not configured to scrape
# them here.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: [northwood-postgres, northwood-kafka, northwood-keycloak]
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_name"]
        regex: "/northwood-(.*)"
        target_label: service
