spring:
  application:
    name: erp-web-ui-bff
  profiles:
    default: dev
  security:
    oauth2:
      client:
        registration:
          # Confidential code flow against the `northwood` Keycloak
          # realm. The client secret is demo-grade — override
          # KEYCLOAK_BFF_CLIENT_SECRET in any environment that isn't your
          # laptop. Spring Security uses the registration name (`keycloak`)
          # to compose the redirect URI: /login/oauth2/code/keycloak.
          keycloak:
            provider: keycloak
            client-id: northwood-bff
            client-secret: ${KEYCLOAK_BFF_CLIENT_SECRET:northwood-bff-secret}
            authorization-grant-type: authorization_code
            scope: openid,profile,email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8090/realms/northwood}
            user-name-attribute: preferred_username

server:
  port: 8089

# Observability. spring-boot-starter-actuator is already on this module's
# classpath; this block exposes the prometheus + metrics + health endpoints
# and wires the OTLP tracing exporter at the Tempo gRPC port.
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  # Suppress the @Scheduled heartbeat spans — the SSE pump (and, in the
  # services, saga poll / outbox drain tick) fires ~1×/s whether or not there's
  # work and swamps Tempo. Disabling the scheduled-task observation loses nothing.
  observations:
    enable:
      tasks.scheduled.execution: false
  tracing:
    sampling:
      # The BFF emits NO spans of its own — each service roots its own trace.
      # ProxyController no longer propagates trace context upstream, so sampling
      # 0 here drops the BFF's own request spans without affecting downstream
      # services.
      probability: 0
  otlp:
    metrics:
      export:
        enabled: false                                # metrics go to Prometheus via scrape; don't OTLP-push them (Tempo's :4318 has no /v1/metrics → 404)
  opentelemetry:
    tracing:
      export:
        otlp:
          # Boot 4 relocated these from management.otlp.tracing.* (now deprecated-ERROR → silently ignored).
          endpoint: ${OTLP_ENDPOINT:http://localhost:4317}
          transport: grpc                             # :4317 = Tempo's OTLP gRPC receiver (default transport is http → :4318/v1/traces)

# Per-target service URLs. Override per environment via env vars
# (NORTHWOOD_BFF_TARGETS_PRODUCT etc.) or another property source.
northwood:
  bff:
    targets:
      product:        http://localhost:8081
      sales:          http://localhost:8082
      inventory:      http://localhost:8083
      manufacturing:  http://localhost:8084
      purchasing:     http://localhost:8085
      finance:        http://localhost:8086
      reporting:      http://localhost:8087

logging:
  level:
    com.northwood.erpbff: INFO
